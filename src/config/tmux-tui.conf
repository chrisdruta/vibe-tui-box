# vibe tui — the HOST-side tmux that owns layout, tabs, and theme.
#
# Loaded by `vibe tui` (src/scripts/host/tui.sh) onto a dedicated socket
# (`tmux -L vibe`), so it never touches a personal ~/.tmux.conf or the
# default server. This is the outer half of the nested pair: panes here run
# `./vibe agent` / `./vibe shell` (docker exec into the container, where the
# per-agent tmux sessions keep persistence) plus native host shells. The
# container-side /etc/tmux.conf stays minimal; ALL ricing lives here.
#
# Requires tmux >= 3.4 (styles containing formats, user mouse ranges);
# >= 3.7 for sixel images that survive adjacent-pane redraws (tui.sh gates).

# ── theme ────────────────────────────────────────────────────────────────
# Navy/periwinkle with a coral accent, matched to statusline.sh and the
# herdr-style target. User options so every style below reads one palette.
set -g @thm_bg      "#0e1421"
set -g @thm_surface "#1a2440"
set -g @thm_border  "#2a3554"
set -g @thm_fg      "#a9b6d8"
set -g @thm_dim     "#5c6b96"
set -g @thm_blue    "#7aa2f7"
set -g @thm_accent  "#3d59a1"
set -g @thm_coral   "#e8735a"
set -g @thm_green   "#9ece6a"
set -g @thm_yellow  "#e0af68"
set -g @thm_red     "#f7768e"

# ── terminal plumbing (mirrors the container conf where it matters) ──────
set -s  default-terminal "tmux-256color"
set -as terminal-features ",xterm*:RGB"
# Extended keys must survive BOTH multiplexers for e.g. Claude's shift+tab;
# the container conf sets the same pair on the inner server.
set -s  extended-keys on
set -as terminal-features ",xterm*:extkeys"
set -s  escape-time 10
set -s  focus-events on
set -g  history-limit 50000
set -g  mouse on
set -s  set-clipboard on
# The inner tmux unwraps passthrough sequences and this server ingests the
# raw sixel natively (the validated 3.7b path); allow-passthrough here only
# matters for anything wrapping a second time — harmless to keep on.
set -g  allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# ── prefix & session behavior ────────────────────────────────────────────
# C-Space: no readline clash in host panes, and the inner agent sessions
# keep C-b so existing muscle memory inside `vibe agent` still works.
# C-a as prefix2: a hedge for setups where Ctrl+Space never reaches the
# pty (IME toggle owns it on some layouts; some terminals don't transmit
# its NUL). Host smoke initially blamed WT for dead chords, but the real
# culprit was a stale server on the socket — C-Space works fine on WT
# once the server runs this conf. Keeping both: C-a costs one double-tap
# (literal C-a for readline) and saves the day on IME-afflicted hosts.
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix
set -g prefix2 C-a
bind C-a send-prefix -2

# Non-login panes: tmux's default login shells re-run the profile chain,
# which on WSL rebuilds PATH WITHOUT the Windows tail (/mnt/c/...) that
# interop injected into the launching session — so host panes lose .exe
# interop tools (e.g. cava.exe) that work fine in a plain WT tab. An
# interactive non-login shell inherits the server's environment, which
# came from the full-PATH shell that ran `vibe tui`.
set -g  default-command "${SHELL}"

set -g  base-index 1
setw -g pane-base-index 1
set -g  renumber-windows on
# Tab names are set deliberately (tui.sh, the palette); don't let programs
# or automatic-rename churn them.
setw -g automatic-rename off
set -g  allow-rename off
# Quit means quit: when a session is destroyed, its clients detach (that
# terminal tab ends) instead of hopping to another project's session.
# The pre-spaces "off" here was unobservable (never a second session to
# hop to — the server just exited); with spaces it teleported a quit tui
# into a different project (live two-project report, 2026-07-22).
set -g  detach-on-destroy on

# ── status bar: tabs on top ──────────────────────────────────────────────
# status line count is owned by the strip hooks below (default "on" = one
# line; the hooks raise it to 2 while a second project session exists).
# Deliberately no "set -g status on" here: an explicit set would collapse
# the strip back to one line on every prefix+R reload.
set -g status-position top
# Event-driven only — nothing here polls, so never wake up on a timer.
set -g status-interval 0
set -g status-style "bg=#{@thm_bg},fg=#{@thm_fg}"
set -g status-left-length 40
set -g status-left "#[fg=#{@thm_coral},bold] ● #[fg=#{@thm_fg},bold]#S #[fg=#{@thm_border}]│ "
set -g window-status-separator " "
# Agent-state dots (BACKLOG "agent state at a glance"): @vibe_glyph /
# @vibe_dot_fg / @vibe_attn are DATA set event-driven by state-render.sh
# (pane-title-changed hook below) — these formats own all presentation,
# restoring their own text color after the dot. @vibe_attn flashes the
# whole tab coral until the agent goes back to work.
setw -g window-status-format "#{?#{@vibe_attn},#[fg=#{@thm_bg}#,bg=#{@thm_coral}#,bold],#[fg=#{@thm_dim}#,bg=#{@thm_surface}]}  #{?#{@vibe_glyph},#[fg=#{@vibe_dot_fg}]#{@vibe_glyph}#{?#{@vibe_attn},#[fg=#{@thm_bg}],#[fg=#{@thm_dim}]} ,}#I·#W  "
setw -g window-status-current-format "#{?#{@vibe_attn},#[fg=#{@thm_bg}#,bg=#{@thm_coral}#,bold],#[fg=#ffffff#,bg=#{@thm_accent}#,bold]}  #{?#{@vibe_glyph},#[fg=#{@vibe_dot_fg}]#{@vibe_glyph}#{?#{@vibe_attn},#[fg=#{@thm_bg}],#[fg=#ffffff]} ,}#I·#W  "
setw -g window-status-bell-style "fg=#{@thm_bg},bg=#{@thm_coral},bold"
# Right side: prefix/copy indicators plus a clickable "+" (user mouse range,
# handled below) that opens a new host window in the repo root.
set -g status-right-length 60
set -g status-right "#{?client_prefix,#[fg=#{@thm_coral}#,bold]⌨ ,}#{?pane_in_mode,#[fg=#{@thm_yellow}#,bold]copy ,}#[range=user|newwin]#[fg=#{@thm_dim},bg=#{@thm_surface}] + #[norange]#[default] "
bind -n MouseDown1Status {
  if -F "#{==:#{mouse_status_range},newwin}" {
    new-window -c "#{session_path}"
  } {
    select-window -t "{mouse}"
  }
}

# ── pane borders: boxed panes with titles ────────────────────────────────
setw -g pane-border-status top
setw -g pane-border-lines single
setw -g pane-border-style "fg=#{@thm_border}"
setw -g pane-active-border-style "fg=#{@thm_blue}"
# @vibe_title is stamped by tui.sh / the palette (and state-render.sh
# stamps the session name on agent panes, keeping the raw vibe1|… title
# encoding out of sight); fall back to the live pane title for ad-hoc
# panes. The state dot rides ahead of the label.
setw -g pane-border-format "#[fg=#{@thm_border}]─#[default] #{?#{@vibe_glyph},#{?#{@vibe_attn},#[fg=#{@thm_coral}],#[fg=#{@vibe_dot_fg}]}#{@vibe_glyph}#[default] ,}#{?pane_active,#[fg=#{@thm_blue}#,bold],#[fg=#{@thm_dim}]}#{?#{@vibe_title},#{@vibe_title},#{pane_title}}#[default] #[fg=#{@thm_border}]"

# ── popups / menus / messages ────────────────────────────────────────────
set -g popup-border-lines rounded
set -g popup-border-style "fg=#{@thm_blue}"
set -g menu-border-lines rounded
set -g menu-style "bg=#{@thm_bg},fg=#{@thm_fg}"
set -g menu-selected-style "bg=#{@thm_accent},fg=#ffffff,bold"
set -g message-style "bg=#{@thm_surface},fg=#{@thm_fg}"
set -g message-command-style "bg=#{@thm_surface},fg=#{@thm_yellow}"
set -g mode-style "bg=#{@thm_accent},fg=#ffffff"

# ── navigation (no prefix) ───────────────────────────────────────────────
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D
bind -n M-1 select-window -t :=1
bind -n M-2 select-window -t :=2
bind -n M-3 select-window -t :=3
bind -n M-4 select-window -t :=4
bind -n M-5 select-window -t :=5
bind -n M-6 select-window -t :=6
bind -n M-7 select-window -t :=7
bind -n M-8 select-window -t :=8
bind -n M-9 select-window -t :=9

# ── windows & panes ──────────────────────────────────────────────────────
bind c new-window   -c "#{session_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
# The agent pane keeps its corpse on exit (remain-on-exit, set by tui.sh)
# instead of collapsing the layout; prefix+r brings it back (vibe tui also
# respawns it automatically on the next reattach).
bind r respawn-pane -k
# An agent pane's death here means the FRONTEND is gone (the docker-exec
# client), not necessarily the agent — the inner tmux session may well be
# alive. Mark it distinctly (◌) instead of trusting the last state.
set-hook -g pane-died {
  display-message "pane exited — prefix+r respawns it"
  if -F "#{@vibe_state}" {
    set-option -p @vibe_state "frontend-dead"
    set-option -p @vibe_glyph "◌"
    set-option -w @vibe_glyph "◌"
    # -F: store the RESOLVED hex — formats inside option values are not
    # recursively expanded at render time (verified on 3.7b), and the
    # pane scope must be set too or it shadows the window value.
    set-option -pF @vibe_dot_fg "#{@thm_dim}"
    set-option -wF @vibe_dot_fg "#{@thm_dim}"
    set-option -w @vibe_attn 0
  }
}

# ── agent-state title channel (BACKLOG "agent state at a glance") ────────
# The container-side hook encodes state into the inner tmux session's
# title; it arrives here as a pane-title change through the docker-exec
# TTY. SECURITY: interpolate ONLY #{pane_id} (server-controlled) — the
# title itself is container-controlled and is fetched out-of-band by
# state-render.sh, never expanded into shell words (spike-validated rule).
set-hook -g pane-title-changed {
  run-shell -b "cd '#{session_path}' && exec bash \"$(./vibe __harness-dir)/src/scripts/host/state-render.sh\" '#{pane_id}'"
}

# ── cross-project strip (status line 2) ──────────────────────────────────
# The fleet-glance half of "agent state at a glance" (BACKLOG spec,
# 2026-07-21): every project session on the socket with its agents' state
# dots — render-only, dots by the same state-render data as the tabs.
# Auto-shows only while a second project session exists (hooks below), so
# a solo project renders exactly the single-line UI. Spike-proven gotchas
# baked in: NO top-level commas inside #{S:}/#{W:} loops (comma is the
# current-window alternate-format separator — style commas are #,); no
# leading bg token (#[default] resets to status-style, which owns the
# bg); attention overrides the dot to coral — the tab dot's @vibe_dot_fg
# is the background color BY DESIGN (it blends into the flashing tab)
# and would be invisible here. Names truncate at 12; windows without
# @vibe_glyph (host shells, popups) emit nothing; a session with no
# stateful window renders name-only (presence).
set -g status-format[1] "#[align=left]#{S: #{?#{==:#{session_name},#{client_session}},#[fg=#{@thm_fg}#,bold],#[fg=#{@thm_dim}]}#{=12:session_name}#[default]#{W:#{?#{@vibe_glyph}, #{?#{@vibe_attn},#[fg=#{@thm_coral}]●,#[fg=#{@vibe_dot_fg}]#{@vibe_glyph}}#[default],}} #[fg=#{@thm_border}]│}"

# Session create/kill does NOT redraw other clients' status lines under
# status-interval 0 (spike-proven) — these hooks are the event-driven
# nudge: pick the line count (strip at >=2 sessions) and refresh every
# client — a FULL refresh, not -S: the line-count flip resizes every
# pane, and a status-only refresh left the resized region glitched on
# nested TUI clients until a manual terminal resize (live report,
# 2026-07-22). POSIX `for`, not `xargs -r` (macOS xargs lacks -r); plain
# `tmux` is correct inside run-shell (it inherits the server context);
# ##{ keeps the format out of run-shell's own expansion.
set-hook -g session-created {
  run-shell -b 'n=$(tmux list-sessions 2>/dev/null | wc -l); if [ "$n" -gt 1 ]; then tmux set -g status 2; else tmux set -g status on; fi; for c in $(tmux list-clients -F "##{client_tty}"); do tmux refresh-client -t "$c"; done'
}
set-hook -g session-closed {
  run-shell -b 'n=$(tmux list-sessions 2>/dev/null | wc -l); if [ "$n" -gt 1 ]; then tmux set -g status 2; else tmux set -g status on; fi; for c in $(tmux list-clients -F "##{client_tty}"); do tmux refresh-client -t "$c"; done'
}

# Leaving: prefix+d (tmux default) detaches — everything keeps running and
# `vibe tui` reattaches. prefix+Q closes the UI session for real; container
# agent sessions are untouched either way, and with the last session gone
# the server exits too, so the next `vibe tui` starts on a fresh binary.
bind Q confirm-before -p "quit vibe tui? agents keep running (y/n)" kill-session
# prefix+K — the palette's "kill ui server": every project's tui session
# dies, container agents keep running. `vibe tui --kill` from any host
# shell is the same thing; `vibe tui --fresh` adds the relaunch (which
# cannot be offered in here — the client dies with the server).
bind K confirm-before -p "kill the whole vibe tui server? agents keep running (y/n)" kill-server

# ── vibe integrations ────────────────────────────────────────────────────
# prefix+v — clipboard image straight into the agent: runs `vibe clip` on
# the host and types the container path into the @vibe_role=agent pane.
bind v run-shell -b "cd '#{session_path}' && exec bash \"$(./vibe __harness-dir)/src/scripts/host/clip-to-pane.sh\" '#{window_id}'"
# prefix+g — quick host-side git in a popup (lazygit when installed).
bind g display-popup -d "#{session_path}" -w 85% -h 85% -E "if command -v lazygit >/dev/null 2>&1; then lazygit; else bash -l; fi"
# prefix+o — switch project (session tree), same letter as the palette
# entry so the direct chord and the menu agree. Overrides tmux's default
# o (rotate-pane, covered better by Alt+arrows) — the default's only
# observed effect here was masquerading as a broken picker. tmux's
# default prefix+s (session chooser) also still works.
bind o choose-tree -Zs
# prefix+Space — the palette: vibe verbs without memorizing anything.
bind Space display-menu -T "#[align=centre] vibe " -x C -y C \
  "agent (claude)"    a "new-window -c \"#{session_path}\" -n claude './vibe agent'" \
  "agent (codex)"     x "new-window -c \"#{session_path}\" -n codex './vibe agent -a codex'" \
  "new agent (named)" n "command-prompt -p \"agent name:\" \"new-window -c '#{session_path}' -n '%1' './vibe agent -s %1'\"" \
  "container shell"   s "new-window -c \"#{session_path}\" -n shell './vibe shell'" \
  "services session"  e "new-window -c \"#{session_path}\" -n services './vibe attach'" \
  "host shell"        h "new-window -c \"#{session_path}\"" \
  "switch project"    o "choose-tree -Zs" \
  "" \
  "clip image → agent" v "run-shell -b \"cd '#{session_path}' && exec bash \\\"$(./vibe __harness-dir)/src/scripts/host/clip-to-pane.sh\\\" '#{window_id}'\"" \
  "git popup"          g "display-popup -d \"#{session_path}\" -w 85% -h 85% -E 'if command -v lazygit >/dev/null 2>&1; then lazygit; else bash -l; fi'" \
  "review diff (revdiff)" r "new-window -c \"#{session_path}\" -n diff './vibe exec revdiff --untracked; echo; read -r -p \"[enter to close]\"'" \
  "doctor"             D "display-popup -d \"#{session_path}\" -w 80% -h 70% -E './vibe doctor; echo; read -r -p \"[enter to close]\"'" \
  "agents (vibe ps)"   p "display-popup -d \"#{session_path}\" -w 70% -h 60% -E './vibe ps; echo; read -r -p \"[enter to close]\"'" \
  "" \
  "detach (keep running)"          d "detach-client" \
  "quit ui (agents keep running)"  Q "confirm-before -p \"quit vibe tui? agents keep running (y/n)\" kill-session" \
  "kill ui server (ALL projects)"  K "confirm-before -p \"kill the whole vibe tui server? agents keep running (y/n)\" kill-server"
# prefix+R — reload this config (tui.sh stamps VIBE_TUI_CONF on the server).
bind R run-shell 'tmux -L vibe source-file "$(tmux -L vibe show-environment -g VIBE_TUI_CONF 2>/dev/null | cut -d= -f2-)" && tmux -L vibe display-message "tmux-tui.conf reloaded"'
