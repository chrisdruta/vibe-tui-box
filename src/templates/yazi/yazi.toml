# Project-owned yazi preferences for `vibe review` / the preview window
# (seeded once; edit freely). This file REPLACES the harness base yazi.toml
# when present — keep `linemode = "verdict"` to keep the ✓/✗ review badges.
# Keybindings: keymap.toml here is merged IN FRONT of the harness's (which
# binds A = approve, R = reject-with-note via the vibe.yazi plugin).
[mgr]
ratio = [1, 2, 5]    # wide preview pane
sort_by = "mtime"
sort_reverse = true  # newest renders first
linemode = "verdict" # per-file ✓/✗ review badges (vibe.yazi plugin)
