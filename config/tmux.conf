set -s default-terminal "tmux-256color"
set -as terminal-features ",xterm*:RGB"
set -s extended-keys on
set -as terminal-features ",xterm*:extkeys"
set -s escape-time 10
set -s focus-events on
set -g history-limit 50000
set -g mouse on
set -s set-clipboard on
# Not used by the harness's own image preview (that rides tmux's native
# sixel compositing — see scripts/show-image.sh) but kept on for tools that
# passthrough their own graphics.
set -g allow-passthrough on
# prefix + i: preview the newest `vibe clip` capture in a transient split (the
# agent TUI can't render images inline). Delegates to the image-baked copy of
# scripts/show-image.sh (see Dockerfile), which emits raw sixel for tmux's
# native image support to composite — scroll/clip/repaint-safe; needs a
# sixel-capable client, which tmux auto-detects.
bind-key i split-window -v -l '75%' 'printf "%s\n" "-- press Enter to close --"; vibe-show-image; read -r _'
