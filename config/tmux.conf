set -s default-terminal "tmux-256color"
set -as terminal-features ",xterm*:RGB"
set -s extended-keys on
set -as terminal-features ",xterm*:extkeys"
set -s escape-time 10
set -s focus-events on
set -g history-limit 50000
set -g mouse on
set -s set-clipboard on
set -g allow-passthrough on
# prefix + i: preview the newest `vibe clip` capture in a transient split (the
# agent TUI can't render images inline). Delegates to the image-baked copy of
# scripts/show-image.sh (see Dockerfile): it needs the allow-passthrough
# above, and anchors the sixel at this pane's client coordinates — raw
# `chafa --passthrough tmux` draws at the client cursor instead, and a busy
# neighbor pane (agent TUI spinner) drags that cursor away mid-splice, wiping
# the render. The close hint prints FIRST so it can't repaint over the image.
bind-key i split-window -v -l '75%' 'printf "%s\n" "-- press Enter to close --"; vibe-show-image; read -r _'
