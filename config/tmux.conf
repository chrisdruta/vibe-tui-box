set -s default-terminal "tmux-256color"
set -as terminal-features ",xterm*:RGB"
set -s extended-keys on
set -as terminal-features ",xterm*:extkeys"
set -s escape-time 10
set -s focus-events on
set -g history-limit 50000
set -g mouse on
set -s set-clipboard on
set -g allow-passthrough on
# prefix + i: preview the newest `vibe clip` capture in a transient split (the
# agent TUI can't render images inline). Sixel goes in a passthrough envelope
# (needs the allow-passthrough above): tmux's own sixel engine ingests images
# but fails to re-emit them to the client, so without passthrough the image
# prints as text soup. Inline logic (chafa is on PATH) because the per-project
# harness path isn't known here; POSIX sh, no bashisms.
bind-key i split-window -v -l '75%' 'f=$(ls -1t /tmp/clip-*.png 2>/dev/null | head -1); if [ -n "$f" ]; then echo "$f"; chafa -f sixel --passthrough tmux "$f"; else echo "No clipped images — run vibe clip on the host first."; fi; printf "%s" "-- press Enter to close --"; read -r _'
